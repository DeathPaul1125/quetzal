<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" aria-label="Quetzal">
  <!-- Fondo con gradiente honey/amber -->
  <defs>
    <linearGradient id="q-bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#fbbf24"/>
      <stop offset="100%" stop-color="#b45309"/>
    </linearGradient>
  </defs>
  <rect width="64" height="64" rx="12" fill="url(#q-bg)"/>

  <!-- Silueta del Quetzal simplificada (escalada para 64px) -->
  <g transform="translate(14 6) scale(0.30)">
    <!-- Plumas de la cola -->
    <path d="M55 100 Q 50 135 42 170 Q 48 175 45 185 Q 53 155 57 105 Z" fill="#065f46"/>
    <path d="M62 100 Q 64 140 60 175 Q 64 180 62 190 Q 68 155 64 105 Z" fill="#047857"/>
    <path d="M68 95 Q 78 140 82 175 Q 80 183 78 188 Q 74 150 65 100 Z" fill="#10b981"/>
    <!-- Pecho rojo -->
    <ellipse cx="52" cy="72" rx="15" ry="18" fill="#b91c1c"/>
    <!-- Cabeza -->
    <ellipse cx="48" cy="48" rx="22" ry="18" fill="#047857"/>
    <!-- Ala -->
    <path d="M58 38 Q 90 18 112 42 Q 100 52 80 54 L 64 52 Z" fill="#065f46"/>
    <!-- Cresta -->
    <path d="M30 28 L 27 15 L 34 24 L 37 12 L 41 24 L 45 10 L 49 24 L 53 12 L 56 24 L 62 15 L 59 30 Z" fill="#065f46"/>
    <!-- Pico -->
    <polygon points="25,46 13,49 25,53" fill="#fbbf24"/>
    <!-- Ojo -->
    <circle cx="42" cy="46" r="2.5" fill="#fff"/>
    <circle cx="42" cy="46" r="1.3" fill="#111"/>
  </g>
</svg>
